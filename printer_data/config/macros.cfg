[gcode_macro _CLIENT_VARIABLE]
variable_use_custom_pos   : True
variable_custom_park_x    : 28.0
variable_custom_park_y    : 10.0
variable_custom_park_dz   : 10.0

variable_retract          : 1.0
variable_cancel_retract   : 5.0
variable_speed_retract    : 35.0
variable_unretract        : 1.0
variable_speed_unretract  : 35.0
variable_speed_hop        : 15.0
variable_speed_move       : 100.0

variable_park_at_cancel   : True
variable_park_at_cancel_x : 28.0
variable_park_at_cancel_y : 210

variable_use_fw_retract   : False
variable_idle_timeout     : 0
variable_runout_sensor    : ""

variable_user_pause_macro : ""
variable_user_resume_macro: ""
variable_user_cancel_macro: ""
gcode:

[gcode_macro _USER_VARIABLE]
description: Shared printer positions for macros
variable_soak_x: 142.5
variable_soak_y: 142.5
variable_park_x: 28.0
variable_park_y: 210.0
variable_service_z: 10.0
gcode:

[gcode_macro START_PRINT]
description: Start print macro called from Orca Slicer
gcode:
    {% set BED = params.BED|default(60)|float %}
    {% set HOTEND = params.HOTEND|default(200)|float %}

    RESPOND TYPE=echo MSG="START_PRINT IS RUNNING - BED={BED} HOTEND={HOTEND}"

    ; Start bed and hotend heating, but do not wait yet
    M140 S{BED}
    M104 S{HOTEND}

    ; Basic setup
    G90                     ; Absolute positioning
    M83                     ; Relative extrusion 
    G92 E0                  ; Reset extruder

    ; Home printer
    G28

    ; Wait for temperatures
    M190 S{BED}
    M109 S{HOTEND}

    ; Level/align gantry
    Z_TILT_ADJUST

    ; Re-home Z after Z_TILT_ADJUST
    G28 Z

    ; Load compensation profiles
    BED_MESH_PROFILE LOAD=default
    SKEW_PROFILE LOAD=Calilantern
        ; Purge line in X direction
    G92 E0
    M83

    ; Move to purge start
    G1 Z2.0 F3000
    G1 X15 Y15 F5000.0
    G1 Z0.3 F1200

    ; Prime nozzle before drawing line
    G1 E8 F300

    ; Draw purge line
    G1 X215 Y15 Z0.3 F1500.0 E15
    G1 X215 Y15.4 Z0.3 F5000.0
    G1 X15 Y15.4 Z0.3 F1500.0 E15

    ; Reset extruder after purge
    G92 E0

    ; Move over to prevent blob squish
    G1 Z2.0 F3000
    G1 X28 Y20 Z0.3 F5000.0

    ; Final positioning before print starts
    G92 E0
    G1 Z2.0 F3000
    G1 X28 Y20 Z0.3 F5000.0

[gcode_macro END_PRINT]
description: End print macro called from Orca Slicer
gcode:
    SAVE_GCODE_STATE NAME=END_PRINT_STATE

    ; Retract and lift safely
    G91
    {% if printer.extruder.can_extrude %}
    M83
    G1 E-2 F1800
    {% else %}
    RESPOND TYPE=echo MSG="Skipping retract: hotend below min_extrude_temp."
    {% endif %}

    {% set z_max = printer.toolhead.axis_maximum.z|float %}
    {% set z_now = printer.toolhead.position.z|float %}
    {% set z_lift = 10 if z_now < (z_max - 10) else (z_max - z_now) %}
    G1 Z{z_lift} F1200

    ; Park and present print
    G90
    G1 X28 Y210 F6000

    ; Shut down heaters and fan
    M104 S0
    M140 S0
    M106 S0

    ; Clear print compensation
    BED_MESH_CLEAR
    SET_SKEW CLEAR=1

    ; Motors off
    M84

    RESTORE_GCODE_STATE NAME=END_PRINT_STATE

[pause_resume]

[gcode_macro M600]
description: Filament change pause
gcode:
    PAUSE X=28 Y=210 Z_MIN=50


[gcode_macro UNLOAD_FILAMENT]
description: Heat nozzle and unload filament
gcode:
    {% set TEMP = params.TEMP|default(210)|float %}

    SAVE_GCODE_STATE NAME=UNLOAD_FILAMENT_STATE

    M104 S{TEMP}
    M109 S{TEMP}

    M83
    G92 E0

    ; Small push first to soften the tip
    G1 E5 F300

    ; Retract/unload filament
    G1 E-60 F900

    G92 E0

    RESTORE_GCODE_STATE NAME=UNLOAD_FILAMENT_STATE


[gcode_macro LOAD_FILAMENT]
description: Heat nozzle and load filament
gcode:
    {% set TEMP = params.TEMP|default(210)|float %}

    SAVE_GCODE_STATE NAME=LOAD_FILAMENT_STATE

    M104 S{TEMP}
    M109 S{TEMP}

    M83
    G92 E0

    ; Feed filament in
    G1 E40 F600

    ; Slow purge
    G1 E20 F180

    G92 E0

    RESTORE_GCODE_STATE NAME=LOAD_FILAMENT_STATE


[gcode_macro HEATSOAK_ONLY]
description: Heatsoak only. Example: HEATSOAK_ONLY BED=60 HOTEND=150 SOAK=20
gcode:
    {% set BED = params.BED|default(60)|float %}
    {% set HOTEND = params.HOTEND|default(150)|float %}
    {% set SOAK = params.SOAK|default(20)|int %}
    _HEATSOAK_NB BED={BED} HOTEND={HOTEND} SOAK={SOAK} ZTILT=0 MESH=0


[gcode_macro HEATSOAK_ZTILT]
description: Heatsoak, then Z tilt. Example: HEATSOAK_ZTILT BED=60 HOTEND=150 SOAK=20
gcode:
    {% set BED = params.BED|default(60)|float %}
    {% set HOTEND = params.HOTEND|default(150)|float %}
    {% set SOAK = params.SOAK|default(20)|int %}
    _HEATSOAK_NB BED={BED} HOTEND={HOTEND} SOAK={SOAK} ZTILT=1 MESH=0


[gcode_macro HEATSOAK_ZTILT_MESH]
description: Heatsoak, then Z tilt and default bed mesh. Example: HEATSOAK_ZTILT_MESH BED=60 HOTEND=150 SOAK=20
gcode:
    {% set BED = params.BED|default(60)|float %}
    {% set HOTEND = params.HOTEND|default(150)|float %}
    {% set SOAK = params.SOAK|default(20)|int %}
    _HEATSOAK_NB BED={BED} HOTEND={HOTEND} SOAK={SOAK} ZTILT=1 MESH=1


[gcode_macro CANCEL_HEATSOAK_NB]
description: Cancel active non-blocking heatsoak
gcode:
    {% set hs = printer["gcode_macro _HEATSOAK_NB"] %}

    RESPOND TYPE=echo MSG="Cancelling heatsoak."
    SET_GCODE_VARIABLE MACRO=_HEATSOAK_NB VARIABLE=active VALUE=0
    SET_GCODE_VARIABLE MACRO=_HEATSOAK_NB VARIABLE=started_soak VALUE=0
    SET_GCODE_VARIABLE MACRO=_HEATSOAK_NB VARIABLE=remaining_m VALUE=0
    UPDATE_DELAYED_GCODE ID=_HEATSOAK_NB_LOOP DURATION=0

    {% if hs.idle_prev|int > 0 %}
        SET_IDLE_TIMEOUT TIMEOUT={hs.idle_prev|int}
    {% endif %}

    RESPOND TYPE=echo MSG="Heatsoak cancelled."


[gcode_macro _HEATSOAK_NB]
description: Hidden non-blocking heatsoak engine with optional Z tilt and mesh.
variable_active: 0
variable_bed: 0
variable_hotend: 0
variable_soak_m: 0
variable_remaining_m: 0
variable_started_soak: 0
variable_tolerance: 1.0
variable_idle_prev: 0
variable_ztilt_after: 0
variable_mesh_after: 0
gcode:
    {% set BED = params.BED|default(60)|float %}
    {% set HOTEND = params.HOTEND|default(150)|float %}
    {% set SOAK = params.SOAK|default(20)|int %}
    {% set TOL = params.TOL|default(1.0)|float %}
    {% set ZTILT = params.ZTILT|default(0)|int %}
    {% set MESH = params.MESH|default(0)|int %}
    {% set IDLE = params.IDLE|default(18000)|int %}

    {% set user = printer["gcode_macro _USER_VARIABLE"] %}
    {% set SOAK_X = params.X|default(user.soak_x)|float %}
    {% set SOAK_Y = params.Y|default(user.soak_y)|float %}
    {% set SOAK_Z = params.Z|default(user.service_z)|float %}

    RESPOND TYPE=echo MSG="Heatsoak starting: bed={BED} hotend={HOTEND} soak={SOAK}min ztilt={ZTILT} mesh={MESH}"

    SET_GCODE_VARIABLE MACRO=_HEATSOAK_NB VARIABLE=active VALUE=1
    SET_GCODE_VARIABLE MACRO=_HEATSOAK_NB VARIABLE=bed VALUE={BED}
    SET_GCODE_VARIABLE MACRO=_HEATSOAK_NB VARIABLE=hotend VALUE={HOTEND}
    SET_GCODE_VARIABLE MACRO=_HEATSOAK_NB VARIABLE=soak_m VALUE={SOAK}
    SET_GCODE_VARIABLE MACRO=_HEATSOAK_NB VARIABLE=remaining_m VALUE={SOAK}
    SET_GCODE_VARIABLE MACRO=_HEATSOAK_NB VARIABLE=started_soak VALUE=0
    SET_GCODE_VARIABLE MACRO=_HEATSOAK_NB VARIABLE=tolerance VALUE={TOL}
    SET_GCODE_VARIABLE MACRO=_HEATSOAK_NB VARIABLE=ztilt_after VALUE={ZTILT}
    SET_GCODE_VARIABLE MACRO=_HEATSOAK_NB VARIABLE=mesh_after VALUE={MESH}
    SET_GCODE_VARIABLE MACRO=_HEATSOAK_NB VARIABLE=idle_prev VALUE={printer.configfile.settings.idle_timeout.timeout}

    SET_IDLE_TIMEOUT TIMEOUT={IDLE}

    M140 S{BED}
    M104 S{HOTEND}

    {% if "xyz" in printer.toolhead.homed_axes %}
        G90
        G1 Z{SOAK_Z} F1200
        G1 X{SOAK_X} Y{SOAK_Y} F6000
    {% else %}
        RESPOND TYPE=echo MSG="Printer not homed. Skipping move to heatsoak position."
    {% endif %}

    UPDATE_DELAYED_GCODE ID=_HEATSOAK_NB_LOOP DURATION=5


[delayed_gcode _HEATSOAK_NB_LOOP]
gcode:
    {% set hs = printer["gcode_macro _HEATSOAK_NB"] %}

    {% if hs.active|int == 0 %}
        RESPOND TYPE=echo MSG="Heatsoak inactive. Stopping loop."

    {% else %}
        {% set bed_now = printer.heater_bed.temperature|float %}
        {% set bed_target = hs.bed|float %}
        {% set hot_now = printer.extruder.temperature|float %}
        {% set hot_target = hs.hotend|float %}
        {% set tol = hs.tolerance|float %}

        {% set bed_ready = bed_now >= (bed_target - tol) %}
        {% set hot_ready = hot_now >= (hot_target - tol) %}

        {% if hs.started_soak|int == 0 %}
            {% if bed_ready and hot_ready %}
                SET_GCODE_VARIABLE MACRO=_HEATSOAK_NB VARIABLE=started_soak VALUE=1
                RESPOND TYPE=echo MSG="Heatsoak at temp. Starting {hs.soak_m|int} minute soak."
                UPDATE_DELAYED_GCODE ID=_HEATSOAK_NB_LOOP DURATION=60
            {% else %}
                RESPOND TYPE=echo MSG="Heatsoak waiting for temp. Bed {bed_now|round(1)}/{bed_target}, Hotend {hot_now|round(1)}/{hot_target}."
                UPDATE_DELAYED_GCODE ID=_HEATSOAK_NB_LOOP DURATION=10
            {% endif %}

        {% else %}
            {% set remaining = hs.remaining_m|int %}

            {% if remaining > 1 %}
                SET_GCODE_VARIABLE MACRO=_HEATSOAK_NB VARIABLE=remaining_m VALUE={remaining - 1}
                RESPOND TYPE=echo MSG="Heatsoak {remaining - 1} min remaining. Bed {bed_now|round(1)}/{bed_target}, Hotend {hot_now|round(1)}/{hot_target}."
                UPDATE_DELAYED_GCODE ID=_HEATSOAK_NB_LOOP DURATION=60
            {% else %}
                RESPOND TYPE=echo MSG="Heatsoak complete."
                SET_GCODE_VARIABLE MACRO=_HEATSOAK_NB VARIABLE=active VALUE=0
                UPDATE_DELAYED_GCODE ID=_HEATSOAK_NB_LOOP DURATION=0
                _HEATSOAK_NB_FINISH
            {% endif %}
        {% endif %}
    {% endif %}


[gcode_macro _HEATSOAK_NB_FINISH]
description: Hidden finish actions for heatsoak.
gcode:
    {% set hs = printer["gcode_macro _HEATSOAK_NB"] %}
    {% set user = printer["gcode_macro _USER_VARIABLE"] %}

    RESPOND TYPE=echo MSG="Heatsoak restoring idle timeout."
    SET_IDLE_TIMEOUT TIMEOUT={hs.idle_prev|int}

    {% if hs.ztilt_after|int == 1 or hs.mesh_after|int == 1 %}
        RESPOND TYPE=echo MSG="Homing before leveling/mesh."
        G28
    {% endif %}

    {% if hs.ztilt_after|int == 1 %}
        RESPOND TYPE=echo MSG="Running Z_TILT_ADJUST."
        Z_TILT_ADJUST
        G28 Z
    {% endif %}

    {% if hs.mesh_after|int == 1 %}
        RESPOND TYPE=echo MSG="Running default bed mesh."
        BED_MESH_CLEAR
        BED_MESH_CALIBRATE PROFILE=default
    {% endif %}

    {% if "xyz" in printer.toolhead.homed_axes %}
        G90
        G1 Z{user.service_z} F1200
        G1 X{user.park_x} Y{user.park_y} F6000
    {% endif %}

    RESPOND TYPE=echo MSG="Heatsoak complete. Run SAVE_CONFIG if you want to save the new mesh."
    
#====================================================================
# IDLE TIMEOUT 
#====================================================================

# Time-out is in seconds, 30 minutes for safety reasons adjust
# at you own risk. 

[idle_timeout]

gcode:
   {% if printer.pause_resume.is_paused %}
     M118 Idle timeout while paused, turning off hotend
     SET_HEATER_TEMPERATURE HEATER=extruder TARGET=0
   {% else %}
     M118 Idle timeout
     TURN_OFF_HEATERS
     M84
   {% endif %}
 timeout: 1800

[gcode_macro TEST_SPEED]
# Home, get position, throw around toolhead, home again.
# If MCU stepper positions (first line in GET_POSITION) are greater than a full step different (your number of microsteps), then skipping occured.
# We only measure to a full step to accomodate for endstop variance.
# Example: TEST_SPEED SPEED=300 ACCEL=5000 ITERATIONS=10

description: Test for max speed and acceleration parameters for the printer. Procedure: Home -> ReadPositionFromMCU -> MovesToolhead@Vel&Accel -> Home -> ReadPositionfromMCU

gcode:
    # Speed
    {% set speed  = params.SPEED|default(printer.configfile.settings.printer.max_velocity)|int %}
    # Iterations
    {% set iterations = params.ITERATIONS|default(5)|int %}
    # Acceleration
    {% set accel  = params.ACCEL|default(printer.configfile.settings.printer.max_accel)|int %}
    # Minimum Cruise Ratio
    {% set min_cruise_ratio = params.MIN_CRUISE_RATIO|default(0.5)|float %}
    # Bounding inset for large pattern (helps prevent slamming the toolhead into the sides after small skips, and helps to account for machines with imperfectly set dimensions)
    {% set bound = params.BOUND|default(20)|int %}
    # Size for small pattern box
    {% set smallpatternsize = SMALLPATTERNSIZE|default(20)|int %}
    
    # Large pattern
        # Max positions, inset by BOUND
        {% set x_min = printer.toolhead.axis_minimum.x %}
        {% if x_min < 0 %}
            {% set x_min = 0 %}
        {% endif %}
    
        {% set y_min = printer.toolhead.axis_minimum.y %}
        {% if y_min < 0 %}
            {% set y_min = 0 %}
        {% endif %}
    
        {% set x_min = x_min + bound %}
        {% set x_max = printer.toolhead.axis_maximum.x - bound %}
        {% set y_min = y_min + bound %}
        {% set y_max = printer.toolhead.axis_maximum.y - bound %}
    
    # Small pattern at center
        # Find X/Y center point
        {% set x_center = (printer.toolhead.axis_minimum.x|float + printer.toolhead.axis_maximum.x|float ) / 2 %}
        {% set y_center = (printer.toolhead.axis_minimum.y|float + printer.toolhead.axis_maximum.y|float ) / 2 %}
        
        # Set small pattern box around center point
        {% set x_center_min = x_center - (smallpatternsize/2) %}
        {% set x_center_max = x_center + (smallpatternsize/2) %}
        {% set y_center_min = y_center - (smallpatternsize/2) %}
        {% set y_center_max = y_center + (smallpatternsize/2) %}

    # Save current gcode state (absolute/relative, etc)
    SAVE_GCODE_STATE NAME=TEST_SPEED
    
    # Output parameters to g-code terminal
    { action_respond_info("TEST_SPEED: starting %d iterations at speed %d, accel %d" % (iterations, speed, accel)) }
    
    # Home and get position for comparison later:
        M400 # Finish moves - https://github.com/AndrewEllis93/Print-Tuning-Guide/issues/66
        G28
        # QGL if not already QGLd (only if QGL section exists in config)
        {% if printer.configfile.settings.quad_gantry_level %}
            {% if printer.quad_gantry_level.applied == False %}
                QUAD_GANTRY_LEVEL
                G28 Z
            {% endif %}
        {% endif %} 
        # Move 50mm away from max position and home again (to help with hall effect endstop accuracy - https://github.com/AndrewEllis93/Print-Tuning-Guide/issues/24)
        G90
        G1 X{printer.toolhead.axis_maximum.x-50} Y{printer.toolhead.axis_maximum.y-50} F{30*60}
        M400 # Finish moves - https://github.com/AndrewEllis93/Print-Tuning-Guide/issues/66
        G28 X Y
        G0 X{printer.toolhead.axis_maximum.x-1} Y{printer.toolhead.axis_maximum.y-1} F{30*60}
        G4 P1000 
        GET_POSITION

    # Go to starting position
    G0 X{x_min} Y{y_min} Z{bound + 10} F{speed*60}

    # Set new limits
    {% if printer.configfile.settings.printer.minimum_cruise_ratio is defined %}
        SET_VELOCITY_LIMIT VELOCITY={speed} ACCEL={accel} MINIMUM_CRUISE_RATIO={min_cruise_ratio}
    {% else %}
        SET_VELOCITY_LIMIT VELOCITY={speed} ACCEL={accel} ACCEL_TO_DECEL={accel / 2}
    {% endif %}

    {% for i in range(iterations) %}
        # Large pattern diagonals
        G0 X{x_min} Y{y_min} F{speed*60}
        G0 X{x_max} Y{y_max} F{speed*60}
        G0 X{x_min} Y{y_min} F{speed*60}
        G0 X{x_max} Y{y_min} F{speed*60}
        G0 X{x_min} Y{y_max} F{speed*60}
        G0 X{x_max} Y{y_min} F{speed*60}
        
        # Large pattern box
        G0 X{x_min} Y{y_min} F{speed*60}
        G0 X{x_min} Y{y_max} F{speed*60}
        G0 X{x_max} Y{y_max} F{speed*60}
        G0 X{x_max} Y{y_min} F{speed*60}
    
        # Small pattern diagonals
        G0 X{x_center_min} Y{y_center_min} F{speed*60}
        G0 X{x_center_max} Y{y_center_max} F{speed*60}
        G0 X{x_center_min} Y{y_center_min} F{speed*60}
        G0 X{x_center_max} Y{y_center_min} F{speed*60}
        G0 X{x_center_min} Y{y_center_max} F{speed*60}
        G0 X{x_center_max} Y{y_center_min} F{speed*60}
        
        # Small pattern box
        G0 X{x_center_min} Y{y_center_min} F{speed*60}
        G0 X{x_center_min} Y{y_center_max} F{speed*60}
        G0 X{x_center_max} Y{y_center_max} F{speed*60}
        G0 X{x_center_max} Y{y_center_min} F{speed*60}
    {% endfor %}

    # Restore max speed/accel/accel_to_decel to their configured values
    {% if printer.configfile.settings.printer.minimum_cruise_ratio is defined %}
        SET_VELOCITY_LIMIT VELOCITY={printer.configfile.settings.printer.max_velocity} ACCEL={printer.configfile.settings.printer.max_accel} MINIMUM_CRUISE_RATIO={printer.configfile.settings.printer.minimum_cruise_ratio} 
    {% else %}
        SET_VELOCITY_LIMIT VELOCITY={printer.configfile.settings.printer.max_velocity} ACCEL={printer.configfile.settings.printer.max_accel} ACCEL_TO_DECEL={printer.configfile.settings.printer.max_accel_to_decel}
    {% endif %}

    # Re-home and get position again for comparison:
        M400 # Finish moves - https://github.com/AndrewEllis93/Print-Tuning-Guide/issues/66
        G28 # This is a full G28 to fix an issue with CoreXZ - https://github.com/AndrewEllis93/Print-Tuning-Guide/issues/12
        # Go to XY home positions (in case your homing override leaves it elsewhere)
        G90
        G0 X{printer.toolhead.axis_maximum.x-1} Y{printer.toolhead.axis_maximum.y-1} F{30*60}
        G4 P1000 
        GET_POSITION

    # Restore previous gcode state (absolute/relative, etc)
    RESTORE_GCODE_STATE NAME=TEST_SPEED